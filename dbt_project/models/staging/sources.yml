version: 2

sources:
  - name: raw_weather
    database: "{{ env_var('GCP_PROJECT_ID') }}"
    schema: raw_weather
    description: "Raw weather data from Open-Meteo API"
    freshness:
      warn_after: {count: 3, period: hour}
      error_after: {count: 6, period: hour}
    loaded_at_field: extracted_at
    tables:
      - name: hourly_observations
        description: "Hourly weather observations for 50+ global cities"
